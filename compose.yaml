services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dockyard}
      POSTGRES_USER: ${POSTGRES_USER:-dockyard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dockyard}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - dockyard-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  dockyard:
    build:
      context: ./dockyard
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://dockyard:dockyard@postgres:5432/dockyard}
      DOCKYARD_ENCRYPTION_KEY: ${DOCKYARD_ENCRYPTION_KEY:-dev-only-change-me}
      AGENT_SHARED_TOKEN: ${AGENT_SHARED_TOKEN:-dev-agent-token}
    ports:
      - "${DOCKYARD_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  dockyard-postgres:
